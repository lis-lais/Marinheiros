services:
  mongo:
    image: mongo:6.0
    container_name: marinheiros-mongo
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: marinheiros-rabbit
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sailor-service:
    build:
      context: .
      dockerfile: apps/sailor-service/Dockerfile
    container_name: sailor-service
    ports:
      - '6001:6001'
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      rabbitmq:
        condition: service_healthy

  schedule-service:
    build:
      context: .
      dockerfile: apps/schedule-service/Dockerfile
    container_name: schedule-service
    ports:
      - '6002:6002'
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - '6000:6000'
    environment:
      - SAILOR_SERVICE_URL=http://sailor-service:6001/sailors
      - SCHEDULE_SERVICE_URL=http://schedule-service:6002/schedules
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
    depends_on:
      sailor-service:
        condition: service_started
      schedule-service:
        condition: service_started

volumes:
  mongo_data:
